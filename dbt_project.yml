name: 'tyk_analytics'
version: '1.0.0'
config-version: 2
# Some default settings for dbt
profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
 - "target"
 - "dbt_packages"

# Set up models, which are basically SQL files, to create tables
models:
 tyk_analytics:
   +materialized: table

   ta26s_assignment_work:
     staging:
       +materialized: table
       +schema: ta26s_nyc_transit_restaurants_staging # dataset sane in BQ

     marts:
       +materialized: table
       +schema: ta26s_nyc_transit_restaurants_marts
      
       shared:
         +materialized: table

       open_restaurant_apps:
         +materialized: table

       dot_311:
         +materialized: table